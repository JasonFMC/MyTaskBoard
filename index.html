<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyTaskBoard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>MyTaskBoard</h1>
    </header>

    <section class="stats-card" id="stats" aria-live="polite" aria-label="Task statistics">
      <span>Total: <strong id="stat-total">0</strong></span>
      <span>Completed: <strong id="stat-done">0</strong></span>
      <span>Open: <strong id="stat-open">0</strong></span>
    </section>

    <section class="add-card" aria-label="Add task">
      <div class="add-row">
        <input
          type="text"
          id="task-input"
          placeholder="Enter a task…"
          autocomplete="off"
          maxlength="500"
        />
        <select id="priority-select" aria-label="Priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
        <button type="button" class="btn-add" id="btn-add">Add</button>
      </div>
    </section>

    <section class="list-card" aria-label="Task list">
      <h2>Tasks</h2>
      <ul id="task-list"></ul>
      <p id="task-empty" class="empty-hint" aria-live="polite" hidden>
        No tasks yet. Add one above.
      </p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
